<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовой чат</title>
    <style>
        body { font-family: sans-serif; background: #1e1e2e; color: #cdd6f4; text-align: center; padding: 30px; }
        h1 { color: #89b4fa; }
        .status { margin: 15px 0; color: #a6e3a1; font-weight: bold; }
        
        /* Панель управления своим микрофоном */
        .controls { background: #313244; padding: 15px; border-radius: 10px; display: inline-block; margin-bottom: 30px; }
        button { background: #f38ba8; color: #11111b; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button.active { background: #a6e3a1; }
        button:hover { opacity: 0.8; }

        /* Список друзей и их громкость */
        #audios { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .user-card { background: #45475a; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; width: 300px; justify-content: space-between; }
        .user-card span { font-size: 14px; font-weight: bold; color: #b4befe; }
        input[type=range] { cursor: pointer; }
    </style>
</head>
<body>
    <h1>Чат для друзей 🎤</h1>
    
    <div class="controls">
        <div class="status" id="status">Подключение микрофона...</div>
        <!-- Кнопка выключения микрофона -->
        <button id="mute-btn" disabled>Отключить микрофон</button>
    </div>
    
    <!-- Сюда будут добавляться плашки друзей с ползунками громкости -->
    <div id="audios"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/');
        const audiosContainer = document.getElementById('audios');
        const statusText = document.getElementById('status');
        const muteBtn = document.getElementById('mute-btn');
        const peers = {};
        let localStream; // Переменная для нашего микрофона

        const configuration = { 'iceServers': [{'urls': 'stun:stun.l.google.com:19302'}] };

        navigator.mediaDevices.getUserMedia({ video: false, audio: true }).then(stream => {
            statusText.innerText = "Микрофон подключен!";
            localStream = stream;
            
            // Включаем кнопку мута
            muteBtn.disabled = false;
            muteBtn.onclick = toggleMute;

            socket.emit('join-room', 'main-room');

            socket.on('user-connected', userId => {
                const peerConnection = new RTCPeerConnection(configuration);
                peers[userId] = peerConnection;
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                peerConnection.onicecandidate = event => {
                    if (event.candidate) socket.emit('candidate', userId, event.candidate);
                };

                peerConnection.ontrack = event => addAudioStream(event.streams[0], userId);

                peerConnection.createOffer()
                    .then(offer => peerConnection.setLocalDescription(offer))
                    .then(() => socket.emit('offer', userId, peerConnection.localDescription));
            });

            socket.on('offer', (userId, description) => {
                const peerConnection = new RTCPeerConnection(configuration);
                peers[userId] = peerConnection;
                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                peerConnection.onicecandidate = event => {
                    if (event.candidate) socket.emit('candidate', userId, event.candidate);
                };

                peerConnection.ontrack = event => addAudioStream(event.streams[0], userId);

                peerConnection.setRemoteDescription(description)
                    .then(() => peerConnection.createAnswer())
                    .then(answer => peerConnection.setLocalDescription(answer))
                    .then(() => socket.emit('answer', userId, peerConnection.localDescription));
            });

            socket.on('answer', (userId, description) => {
                peers[userId].setRemoteDescription(description);
            });

            socket.on('candidate', (userId, candidate) => {
                peers[userId].addIceCandidate(new RTCIceCandidate(candidate));
            });

            socket.on('user-disconnected', userId => {
                if (peers[userId]) peers[userId].close();
                // Удаляем карточку пользователя, когда он выходит
                const wrapperEl = document.getElementById(`wrapper-${userId}`);
                if (wrapperEl) wrapperEl.remove();
            });
        }).catch(err => {
            statusText.innerText = "Ошибка: Разреши доступ к микрофону!";
            statusText.style.color = "#f38ba8";
        });

        // Функция включения/выключения своего микрофона
        function toggleMute() {
            // Получаем аудиодорожку с микрофона
            const audioTrack = localStream.getAudioTracks()[0];
            // Инвертируем состояние (вкл/выкл)
            audioTrack.enabled = !audioTrack.enabled;
            
            if (audioTrack.enabled) {
                muteBtn.innerText = "Отключить микрофон";
                muteBtn.classList.remove('active');
            } else {
                muteBtn.innerText = "Включить микрофон";
                muteBtn.classList.add('active');
            }
        }

        // Функция добавления друга в интерфейс
        function addAudioStream(stream, userId) {
            if (document.getElementById(`wrapper-${userId}`)) return;
            
            // Создаем плашку для пользователя
            const wrapper = document.createElement('div');
            wrapper.id = `wrapper-${userId}`;
            wrapper.className = 'user-card';
            
            // Имя пользователя (пока используем кусочек его ID)
            const label = document.createElement('span');
            label.innerText = `Друг ${userId.substring(0, 4)}`;
            
            // Сам звук (невидимый плеер)
            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            
            // Ползунок громкости
            const volumeControl = document.createElement('input');
            volumeControl.type = 'range';
            volumeControl.min = 0;
            volumeControl.max = 1;
            volumeControl.step = 0.05; // Шаг изменения громкости
            volumeControl.value = 1;   // 100% громкости по умолчанию
            
            // При движении ползунка меняем громкость
            volumeControl.oninput = (e) => {
                audio.volume = e.target.value;
            };

            // Собираем всё вместе
            wrapper.append(label, volumeControl, audio);
            audiosContainer.append(wrapper);
        }
    </script>
</body>
</html>
