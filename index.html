<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Voice Chat</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    background: #1e293b;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

#start { background: #22c55e; }
#mute { background: #ef4444; }

.users {
    max-width: 400px;
    margin: auto;
}

.user {
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.volume {
    width: 100px;
}

.status {
    text-align: center;
    margin-top: 10px;
    color: #94a3b8;
}
</style>
</head>

<body>

<header>🎤 Голосовой чат</header>

<div class="controls">
    <button id="start">Подключиться</button>
    <button id="mute" disabled>Мут</button>
</div>

<div class="status" id="status">Не подключен</div>
<div class="users" id="users"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const peers = {};
const pending = {};
const usersDiv = document.getElementById('users');
const statusText = document.getElementById('status');

let localStream;
let muted = false;

const config = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
    ]
};

document.getElementById('start').onclick = async () => {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        socket.emit('join-room', 'main');
        statusText.innerText = "Подключен";
        document.getElementById('mute').disabled = false;

    } catch {
        statusText.innerText = "Нет доступа к микрофону";
    }
};

document.getElementById('mute').onclick = () => {
    const track = localStream.getAudioTracks()[0];
    muted = !muted;
    track.enabled = !muted;
    document.getElementById('mute').innerText = muted ? "Включить" : "Мут";
};

function createPeer(id, initiator) {
    if (peers[id]) return peers[id];

    const pc = new RTCPeerConnection(config);
    peers[id] = pc;

    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.onicecandidate = e => {
        if (e.candidate) socket.emit('candidate', id, e.candidate);
    };

    pc.ontrack = e => addUser(id, e.streams[0]);

    if (initiator) {
        pc.createOffer()
            .then(o => pc.setLocalDescription(o))
            .then(() => socket.emit('offer', id, pc.localDescription));
    }

    return pc;
}

socket.on('room-users', list => {
    list.forEach(id => createPeer(id, true));
});

socket.on('user-connected', id => {
    createPeer(id, true);
});

socket.on('offer', (id, desc) => {
    const pc = createPeer(id, false);

    pc.setRemoteDescription(desc)
        .then(() => pc.createAnswer())
        .then(a => pc.setLocalDescription(a))
        .then(() => socket.emit('answer', id, pc.localDescription))
        .then(() => flush(id));
});

socket.on('answer', (id, desc) => {
    const pc = peers[id];
    if (!pc) return;

    pc.setRemoteDescription(desc).then(() => flush(id));
});

socket.on('candidate', (id, c) => {
    const pc = peers[id];

    if (pc && pc.remoteDescription) {
        pc.addIceCandidate(new RTCIceCandidate(c));
    } else {
        if (!pending[id]) pending[id] = [];
        pending[id].push(c);
    }
});

function flush(id) {
    const pc = peers[id];
    if (!pending[id]) return;

    pending[id].forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
    delete pending[id];
}

socket.on('user-disconnected', id => {
    if (peers[id]) peers[id].close();
    delete peers[id];

    const el = document.getElementById("user-" + id);
    if (el) el.remove();
});

function addUser(id, stream) {
    if (document.getElementById("user-" + id)) return;

    const wrap = document.createElement('div');
    wrap.className = "user";
    wrap.id = "user-" + id;

    const name = document.createElement('span');
    name.innerText = "Друг " + id.slice(0, 4);

    const volume = document.createElement('input');
    volume.type = "range";
    volume.min = 0;
    volume.max = 1;
    volume.step = 0.05;
    volume.value = 1;
    volume.className = "volume";

    const audio = document.createElement('audio');
    audio.srcObject = stream;
    audio.autoplay = true;

    volume.oninput = e => audio.volume = e.target.value;

    wrap.append(name, volume, audio);
    usersDiv.appendChild(wrap);
}
</script>

</body>
</html>
